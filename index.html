<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MedFlow — ระบบติดตามการจัดซื้อยา</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap');

/* ── MedFlow Design System ──────────────────────────────── */
:root{
  --c50:#f5fdf8;  --c100:#ecfaf3; --c150:#d8f2e4;
  --c200:#c0e8d2; --c300:#8dd4ab; --c400:#52bb83;
  --c500:#2daa65; --c600:#23794a; --c700:#1a5c34;
  --c800:#134024; --c900:#0d2f1c; --c950:#061a0e;
  --ink:#111827; --ink2:#374151; --ink3:#6b7280;
  --line:#e5e7eb; --line2:#f3f4f6;
  --bg:#f8fafc; --surface:#ffffff;
  --blue:#2563eb; --amber:#d97706; --rose:#dc2626;
  --violet:#7c3aed; --emerald:#059669;
  --s0:0 1px 2px rgba(0,0,0,.05);
  --s1:0 1px 4px rgba(0,0,0,.08);
  --s2:0 4px 16px rgba(0,0,0,.10);
  --s3:0 8px 32px rgba(0,0,0,.14);
  --r:10px; --rs:7px; --rl:16px;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Sarabun','Segoe UI',system-ui,sans-serif;
  background:var(--bg); color:var(--ink);
  font-size:14px; line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--line2)}
::-webkit-scrollbar-thumb{background:var(--c300);border-radius:99px}
input:focus,select:focus,textarea:focus{
  outline:none!important;
  border-color:var(--c500)!important;
  box-shadow:0 0 0 3px rgba(45,170,101,.16)!important;
}

/* ── App shell ──────────────────────────────────────────── */
.min-h-screen{min-height:100vh;background:var(--bg)}

/* ── Topbar (sticky header) ─────────────────────────────── */
.mf-topbar{
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 0 14px; margin-bottom:20px;
  border-bottom:1px solid var(--line);
  gap:16px;
}

/* ── Logo ────────────────────────────────────────────────── */
.mf-logo-wrap{display:flex;align-items:center;gap:11px;flex-shrink:0}
.mf-logo-img{
  width:40px;height:40px;border-radius:10px;
  object-fit:cover;box-shadow:var(--s1);
  border:1.5px solid var(--c200);
}
.mf-logo-name-row{display:flex;align-items:center;gap:7px;margin-bottom:2px}
.mf-project-name{
  font-size:18px;font-weight:800;color:var(--c900);
  letter-spacing:-.03em;line-height:1;
}
.mf-admin-badge{
  font-size:10px;font-weight:700;
  background:linear-gradient(135deg,#fef3c7,#fde68a);
  color:#92400e;border:1px solid #fcd34d;
  padding:2px 7px;border-radius:99px;
}
.mf-status-row{display:flex;align-items:center;gap:6px}
.mf-status-dot{
  width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0;
}
.mf-dot-ok{background:#22c55e;box-shadow:0 0 0 2px rgba(34,197,94,.2);animation:pulse 2s infinite}
.mf-dot-err{background:#ef4444;box-shadow:0 0 0 2px rgba(239,68,68,.2);animation:pulse 1s infinite}
.mf-status-ok{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--c500);font-weight:600}
.mf-status-err{display:flex;align-items:center;gap:5px;font-size:11px;color:#ef4444;font-weight:600}
.mf-refresh-btn{
  font-size:13px;color:var(--ink3);background:none;border:none;
  cursor:pointer;padding:2px 4px;border-radius:4px;
  transition:all .15s;line-height:1;
}
.mf-refresh-btn:hover{color:var(--c600);background:var(--c100)}

/* ── Header button system ────────────────────────────────── */
.ph-header-btns{display:flex;align-items:center;gap:7px;flex-wrap:wrap;justify-content:flex-end;flex:1}
.ph-btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:0 13px;height:34px;
  font-size:12px;font-weight:600;
  border-radius:var(--rs);border:1.5px solid transparent;
  cursor:pointer;transition:all .18s cubic-bezier(.4,0,.2,1);
  white-space:nowrap;font-family:inherit;line-height:1;
  position:relative;letter-spacing:.01em;
}
.ph-btn-outline{
  background:var(--surface);color:var(--c700);
  border-color:var(--c200);box-shadow:var(--s0);
}
.ph-btn-outline:hover{
  background:var(--c50);border-color:var(--c400);color:var(--c900);
  box-shadow:var(--s1);transform:translateY(-1px);
}
.ph-btn-primary{
  background:var(--surface);color:var(--c700);
  border-color:var(--c200);box-shadow:var(--s0);
}
.ph-btn-primary:hover{
  background:var(--c50);border-color:var(--c400);
  box-shadow:var(--s1);transform:translateY(-1px);
}
.ph-btn-green{
  background:linear-gradient(135deg,var(--c500),var(--c600));
  color:#fff;border-color:transparent;
  box-shadow:0 2px 8px rgba(45,170,101,.35);
}
.ph-btn-green:hover{
  background:linear-gradient(135deg,var(--c400),var(--c500));
  box-shadow:0 4px 14px rgba(45,170,101,.45);transform:translateY(-1px);
}
.ph-btn-xs{padding:0 8px;height:28px;font-size:11px}
.ph-btn:active{transform:translateY(0)!important}

/* ── Stat Cards ──────────────────────────────────────────── */
.mf-stat-grid{
  display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:20px;
}
.mf-stat-card{
  background:var(--sb,var(--c100));
  border-radius:var(--r);padding:14px 14px 12px;
  border:1px solid rgba(0,0,0,.06);
  box-shadow:var(--s0);transition:all .2s ease;
  cursor:default;position:relative;overflow:hidden;
}
.mf-stat-card::before{
  content:"";position:absolute;left:0;top:0;bottom:0;
  width:3.5px;background:var(--sc,var(--c500));border-radius:2px 0 0 2px;
}
.mf-stat-card:hover{box-shadow:var(--s2);transform:translateY(-2px)}
.mf-stat-icon{font-size:18px;margin-bottom:6px;line-height:1}
.mf-stat-val{
  font-size:26px;font-weight:800;color:var(--sc,var(--c900));
  line-height:1;margin-bottom:3px;
}
.mf-stat-lbl{font-size:10.5px;font-weight:600;color:var(--ink3);letter-spacing:.03em}

/* ── Tabs ────────────────────────────────────────────────── */
.mf-tabs{
  display:flex;gap:3px;padding:4px;
  background:var(--line2);border-radius:var(--rs);
  flex-wrap:wrap;width:fit-content;margin-bottom:12px;
}
.mf-tab{
  padding:6px 14px;font-size:12px;font-weight:600;
  border-radius:5px;border:none;cursor:pointer;
  background:transparent;color:var(--ink3);
  transition:all .15s;font-family:inherit;
}
.mf-tab:hover{background:rgba(255,255,255,.7);color:var(--c700)}
.mf-tab.active{background:var(--c900);color:#fff;box-shadow:var(--s0)}

/* ── Search ──────────────────────────────────────────────── */
.mf-search-input{
  flex:1;background:var(--surface);
  border:1.5px solid var(--line);border-radius:var(--rs);
  padding:8px 13px;font-size:13px;color:var(--ink);
  font-family:inherit;transition:all .2s;box-shadow:var(--s0);
}
.mf-search-input:hover{border-color:var(--c300)}

/* ── Filter panel ────────────────────────────────────────── */
.mf-filter-panel{
  background:linear-gradient(135deg,var(--c900),var(--c800));
  border-radius:var(--rs);padding:12px 16px;margin-bottom:12px;
  display:flex;gap:10px;align-items:center;flex-wrap:wrap;
  border:1px solid var(--c700);
}

/* ── Table ───────────────────────────────────────────────── */
.ph-table,
table.w-full{width:100%;border-collapse:collapse;font-size:13px}
.ph-table thead th,
thead th{
  background:var(--c900);color:#ffffff;
  font-size:11px;font-weight:700;letter-spacing:.05em;
  text-transform:uppercase;padding:10px 14px;text-align:left;
  border-bottom:2px solid var(--c700);
}
.ph-table tbody tr,
tbody tr{border-bottom:1px solid var(--line2);transition:background .12s}
.ph-table tbody tr:nth-child(even),
tbody tr:nth-child(even){background:var(--c50)}
.ph-table tbody tr:hover,
tbody tr:hover{background:var(--c100)!important}
.ph-table td,td{padding:10px 14px;vertical-align:middle}

/* ── Status badges ───────────────────────────────────────── */
.badge{
  display:inline-flex;align-items:center;gap:3px;
  padding:2px 8px;border-radius:99px;
  font-size:11px;font-weight:700;
}
.badge-ordered  {background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
.badge-received {background:#fffbeb;color:#b45309;border:1px solid #fde68a}
.badge-inspected{background:#f5f3ff;color:#6d28d9;border:1px solid #ddd6fe}
.badge-entered  {background:#ecfdf5;color:#059669;border:1px solid #a7f3d0}
.badge-urg      {background:#fff1f2;color:#be123c;border:1px solid #fecdd3}
.badge-walkin   {background:#fefce8;color:#854d0e;border:1px solid #fde68a}
.badge-sourcea  {background:var(--c100);color:var(--c700);border:1px solid var(--c200)}

/* ── Modal ───────────────────────────────────────────────── */
.ph-overlay,.fixed.inset-0{
  position:fixed;inset:0;z-index:50;
  background:rgba(6,26,14,.55);backdrop-filter:blur(5px);
  display:flex;align-items:center;justify-content:center;padding:16px;
  animation:fadeIn .2s ease;
}
.ph-modal,
.bg-white.rounded-2xl{
  background:var(--surface);border-radius:var(--rl);
  box-shadow:var(--s3);border:1px solid var(--line);
  width:100%;overflow:hidden;animation:slideUp .22s ease;
}
.modal-header-bar{
  padding:16px 20px 13px;
  border-bottom:1px solid var(--line);
  background:linear-gradient(to right,var(--c50),var(--surface));
  display:flex;align-items:center;justify-content:space-between;
}
.modal-footer-bar{
  padding:12px 20px;border-top:1px solid var(--line);
  background:var(--bg);display:flex;justify-content:flex-end;gap:8px;
}

/* ── Login ───────────────────────────────────────────────── */
.ph-login-bg{
  min-height:100vh;
  background:linear-gradient(160deg,var(--c950) 0%,var(--c900) 45%,var(--c800) 80%,var(--c700) 100%);
  display:flex;align-items:flex-start;justify-content:center;
  padding:12px;position:relative;overflow-y:auto;
}
.ph-login-bg::before{
  content:"";position:absolute;inset:0;
  background:
    radial-gradient(ellipse at 25% 50%,rgba(45,170,101,.18) 0%,transparent 55%),
    radial-gradient(ellipse at 80% 20%,rgba(82,187,131,.1) 0%,transparent 50%);
}
.ph-login-card{
  background:rgba(255,255,255,.98);border-radius:var(--rl);
  box-shadow:var(--s3),0 0 0 1px rgba(45,170,101,.15);
  width:100%;max-width:360px;overflow:hidden;
  position:relative;z-index:1;animation:slideUp .28s ease;
  margin:auto 0;
}
.ph-login-head{
  background:linear-gradient(160deg,var(--c50) 0%,var(--surface) 100%);
  padding:28px 26px 20px;text-align:center;
  border-bottom:1px solid var(--line);
}

/* ── Login URL section ───────────────────────────────────── */
.login-url-box{background:#f8f9ff;border:1.5px solid #c7d2fe;border-radius:10px;padding:8px 10px}
.login-url-title{font-size:11px;font-weight:700;color:#3730a3;text-transform:uppercase;letter-spacing:.06em}
.login-url-input{
  width:100%;background:#fff;border:1.5px solid #c7d2fe;border-radius:7px;
  padding:9px 12px;font-size:11px;font-family:"SF Mono","Fira Code",monospace;
  color:#1e1b4b;transition:border .2s;
}
.login-url-input:focus{outline:none;border-color:#6366f1!important;box-shadow:0 0 0 3px rgba(99,102,241,.15)!important}
.login-url-input::placeholder{color:#a5b4fc}
.login-url-hint{margin-top:4px;font-size:9.5px;color:#818cf8}
.login-url-connected{
  display:flex;align-items:center;gap:9px;
  background:#f0fdf4;border:1.5px solid #bbf7d0;border-radius:10px;padding:10px 14px;
}
.login-conn-dot{
  width:7px;height:7px;border-radius:50%;background:#22c55e;flex-shrink:0;
  box-shadow:0 0 0 3px rgba(34,197,94,.2);animation:pulse 2s infinite;
}
.login-conn-label{font-size:12px;font-weight:600;color:#15803d}
.login-footer-row{text-align:center;margin-top:2px}
.login-change-url-link{
  font-size:10.5px;color:#9ca3af;background:none;border:none;
  cursor:pointer;font-family:inherit;padding:2px 4px;transition:color .18s;
}
.login-change-url-link:hover{color:#6b7280}

/* ── Toast ───────────────────────────────────────────────── */
.ph-toast-success{background:linear-gradient(135deg,var(--c900),var(--c800))}
.ph-toast-error  {background:linear-gradient(135deg,#7f1d1d,#991b1b)}
.ph-toast-info   {background:linear-gradient(135deg,#1e3a5f,#1d4ed8)}

/* ── Animations ──────────────────────────────────────────── */
@keyframes pulse  {0%,100%{opacity:1}50%{opacity:.4}}
@keyframes fadeIn {from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(10px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes slideRight{from{transform:translateX(16px);opacity:0}to{transform:translateX(0);opacity:1}}

/* ── Responsive ──────────────────────────────────────────── */
@media(max-width:1024px){.mf-stat-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:640px){
  .mf-stat-grid{grid-template-columns:repeat(2,1fr)}
  .mf-topbar{flex-wrap:wrap}
  .ph-header-btns{width:100%}
  body{font-size:13px}
}
</style>
</head>
<body>
<script>
window.onerror=function(msg,src,line,col,err){
  var d=document.getElementById('error-display');
  if(d){d.style.display='block';d.innerHTML='<strong>❌ JavaScript Error:</strong>
'+msg+'
Line: '+line+'
File: '+src;}
  var l=document.getElementById('loading-indicator');
  if(l)l.style.display='none';
  return false;
};
</script>
<div id="loading-indicator" style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:12px;color:#374151">
  <div style="font-size:32px">💊</div>
  <p style="font-size:14px;color:#6b7280">กำลังโหลดระบบ...</p>
  <p style="font-size:11px;color:#9ca3af">กรุณารอสักครู่ อาจใช้เวลาสักครู่ในการโหลดครั้งแรก</p>
</div>
<div id="error-display" style="display:none;padding:20px;background:#fee;border:2px solid red;margin:20px;border-radius:8px;font-family:monospace;white-space:pre-wrap"></div>
<div id="root"></div>
<script>
const GAS_URL_KEY = "pharmacy_gas_url";
const AUTH_KEY = "pharmacy_auth_v2";
const HARDCODED_GAS_URL = "https://script.google.com/macros/s/AKfycbySGRyZfpX7x-jNiYe9Nb1yUhU3Q5BUmhuR39dQMmc3IowNJglmFJkdOLiALvPFS3cYzw/exec";
if (HARDCODED_GAS_URL && !localStorage.getItem(GAS_URL_KEY)) {
  localStorage.setItem(GAS_URL_KEY, HARDCODED_GAS_URL);
}
function getAuth() {
  try {
    const s = localStorage.getItem(AUTH_KEY);
    return s ? JSON.parse(s) : null;
  } catch (e) {
    return null;
  }
}
function setAuth(user) {
  localStorage.setItem(AUTH_KEY, JSON.stringify(user));
}
function clearAuth() {
  localStorage.removeItem(AUTH_KEY);
}
function canEdit(auth) {
  return auth && auth.role === "admin";
}
const {
  useState,
  useCallback,
  useEffect,
  useRef
} = React;
const POLL_MS = 15000;
const TODAY = new Date().toISOString().slice(0, 10);
function fmtDate(d) {
  if (!d) return "—";
  const s = typeof d === "string" ? d : String(d);
  if (s === "—") return "—";
  // ISO datetime: 2025-01-15T... หรือ 2025-01-15 17:00:00
  const mDT = s.match(/^(\d{4})-(\d{2})-(\d{2})[T ].*/);
  if (mDT) return mDT[3] + "-" + mDT[2] + "-" + mDT[1];
  // ISO date: YYYY-MM-DD
  const mISO = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if (mISO) return mISO[3] + "-" + mISO[2] + "-" + mISO[1];
  // DD/MM/YYYY หรือ D/M/YYYY
  const mDMY = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
  if (mDMY) return mDMY[1].padStart(2,"0") + "-" + mDMY[2].padStart(2,"0") + "-" + mDMY[3];
  // DD-MM-YYYY (format ถูกต้องแล้ว)
  const mDash = s.match(/^(\d{2})-(\d{2})-(\d{4})$/);
  if (mDash) return s;
  return s;
}
const SL = {
  ordered: "สั่งซื้อแล้ว",
  received: "รับของแล้ว",
  inspected: "ตรวจรับแล้ว",
  entered: "ลงใน INVs แล้ว"
};
const SO = {
  ordered: 0,
  received: 1,
  inspected: 2,
  entered: 3
};
function ns(x) {
  if (x.st === "ordered") return "⏳ รอรับของ";
  if (x.st === "received") return "🔍 รอตรวจรับ";
  if (x.st === "inspected") return "💾 รอลงใน INVs";
  return "✅ เสร็จสมบูรณ์";
}
function al(x) {
  if (x.st === "ordered") return "รับของ";
  if (x.st === "received") return "ตรวจรับ";
  if (x.st === "inspected") return "ลงใน INVs";
  return "ดูรายละเอียด";
}
function genId() {
  return "PH-" + Date.now() + "-" + Math.floor(Math.random() * 9999);
}
function dupKey(x) {
  return [String(x.name || "").trim().toLowerCase(), String(x.qty || ""), String(x.unit || "").trim().toLowerCase(), String(x.pack || "").trim().toLowerCase(), String(x.od || "").trim()].join("|");
}
function excelDate(v) {
  if (!v) return TODAY;
  if (typeof v === "number") {
    return new Date(Math.round((v - 25569) * 86400 * 1000)).toISOString().slice(0, 10);
  }
  if (typeof v === "string") {
    const s = v.trim();
    const m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
    if (m) {
      let y = parseInt(m[3]);
      if (y < 100) y += 2000;
      if (y > 2500) y -= 543;
      return y + "-" + String(m[2]).padStart(2, "0") + "-" + String(m[1]).padStart(2, "0");
    }
    if (/^\d{4}-\d{2}-\d{2}$/.test(s)) return s;
    const d = new Date(s);
    if (!isNaN(d)) return d.toISOString().slice(0, 10);
  }
  if (v instanceof Date) return v.toISOString().slice(0, 10);
  return TODAY;
}
async function apiGet(u) {
  const r = await fetch(u, {
    method: "GET"
  });
  const text = await r.text();
  try {
    return JSON.parse(text);
  } catch (e) {
    const clean = (text || "").replace(/<[^>]+>/g, " ").trim().substring(0, 200);
    throw new Error("Response ไม่ใช่ JSON — ตรวจสอบ GAS Deploy settings (Who=Anyone) Preview:" + clean);
  }
}
async function apiPost(u, b) {
  const r = await fetch(u, {
    method: "POST",
    headers: {
      "Content-Type": "text/plain;charset=utf-8"
    },
    body: JSON.stringify(b)
  });
  const text = await r.text();
  try {
    return JSON.parse(text);
  } catch (e) {
    const clean = (text || "").replace(/<[^>]+>/g, " ").trim().substring(0, 200);
    throw new Error("POST Response ไม่ใช่ JSON: " + clean);
  }
}
async function apiPing(u) {
  try {
    const r = await fetch(u + "?action=ping", {
      method: "GET"
    });
    const t = await r.text();
    const j = JSON.parse(t);
    return j.pong === true;
  } catch (e) {
    return false;
  }
}
function StatusBadge({
  st
}) {
  const bg = {
    ordered: "bg-blue-100 text-blue-800",
    received: "bg-amber-100 text-amber-800",
    inspected: "bg-green-100 text-green-800",
    entered: "bg-teal-100 text-teal-800"
  };
  const dot = {
    ordered: "bg-blue-500",
    received: "bg-amber-500",
    inspected: "bg-green-600",
    entered: "bg-teal-600"
  };
  return React.createElement("span", {
    className: "inline-flex items-center gap-1.5 px-2 py-0.5 rounded-full text-xs font-medium " + bg[st]
  }, React.createElement("span", {
    className: "w-1.5 h-1.5 rounded-full " + dot[st]
  }), SL[st]);
}
function Toasts({
  list,
  onRemove
}) {
  return React.createElement("div", {
